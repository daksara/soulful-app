<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram?.WebApp;
tg?.expand();

let history = [];
let busy = false;
let lang = 'id';

// 🔥 USER ID (Telegram + fallback browser)
function getUserId() {
  let userId = tg?.initDataUnsafe?.user?.id;

  if (!userId) {
    userId = localStorage.getItem('guest_id');
    if (!userId) {
      userId = crypto.randomUUID();
      localStorage.setItem('guest_id', userId);
    }
  }

  return userId;
}

// ===== UI HELPERS =====
function addUser(text) {
  const chat = document.getElementById('chat');
  chat.innerHTML += `<div class="msg user">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

function addAI(text) {
  const chat = document.getElementById('chat');
  chat.innerHTML += `<div class="msg ai">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  chat.innerHTML += `<div class="msg ai" id="typing">...</div>`;
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing')?.remove();
}

function showToast(msg) {
  alert(msg);
}

// ===== SEND MESSAGE =====
async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();

  if (!text || busy) return;

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  busy = true;

  addUser(text);
  history.push({ role: 'user', content: text });
  showTyping();

  const userId = getUserId(); // 🔥 penting

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId,
        messages: [
          { role: 'system', content: 'Kamu adalah AI yang empatik dan menenangkan.' },
          ...history
        ]
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Server error');
    }

    const reply =
      data.choices?.[0]?.message?.content ||
      data.error ||
      'Tidak ada respons';

    history.push({ role: 'assistant', content: reply });

    hideTyping();
    addAI(reply);

  } catch (err) {
    hideTyping();
    showToast('❌ ' + err.message);
    console.error(err);
  }

  // 🔥 delay anti spam
  setTimeout(() => {
    busy = false;
    document.getElementById('sendBtn').disabled = false;
  }, 2000);
}

// ===== ENTER KEY =====
document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') send();
});
</script>
