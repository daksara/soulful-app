<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #d1e7dd;
      margin-left: auto;
    }

    .ai {
      background: #fff;
      margin-right: auto;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #fff;
      border-top: 1px solid #ccc;
    }

    #inp {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #sendBtn {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="inp" placeholder="Tulis pesan..." />
  <button id="sendBtn" onclick="send()">Kirim</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram?.WebApp;
tg?.expand();

let history = JSON.parse(localStorage.getItem('chat_history') || '[]');
let busy = false;

// 🔐 Escape HTML (anti XSS)
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, m => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  }[m]));
}

// 🔥 USER ID
function getUserId() {
  let userId = tg?.initDataUnsafe?.user?.id;

  if (!userId) {
    userId = localStorage.getItem('guest_id');
    if (!userId) {
      userId = crypto.randomUUID();
      localStorage.setItem('guest_id', userId);
    }
  }

  return userId;
}

// UI
function addUser(text) {
  const chat = document.getElementById('chat');
  chat.innerHTML += `<div class="msg user">${escapeHTML(text)}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

function addAI(text) {
  const chat = document.getElementById('chat');
  chat.innerHTML += `<div class="msg ai">${escapeHTML(text)}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  chat.innerHTML += `<div class="msg ai" id="typing">...</div>`;
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing')?.remove();
}

// 🔄 Load chat lama
history.forEach(m => {
  if (m.role === 'user') addUser(m.content);
  if (m.role === 'assistant') addAI(m.content);
});

// SEND
async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();

  if (!text || busy) return;

  if (text.length > 500) {
    alert('Pesan terlalu panjang');
    return;
  }

  inp.value = '';
  busy = true;

  addUser(text);
  history.push({ role: 'user', content: text });
  history = history.slice(-10);

  localStorage.setItem('chat_history', JSON.stringify(history));

  showTyping();

  const userId = getUserId();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId,
        messages: [
          { role: 'system', content: 'Kamu adalah AI yang empatik dan membantu.' },
          ...history
        ]
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Server error');
    }

    const reply =
      data.choices?.[0]?.message?.content ||
      'Tidak ada respons';

    history.push({ role: 'assistant', content: reply });
    history = history.slice(-10);

    localStorage.setItem('chat_history', JSON.stringify(history));

    hideTyping();
    addAI(reply);

  } catch (err) {
    hideTyping();
    addAI('⚠️ Terjadi error, coba lagi ya.');
    console.error(err);
  }

  setTimeout(() => {
    busy = false;
  }, 2000);
}

// ENTER
document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') send();
});
</script>

</body>
</html>
